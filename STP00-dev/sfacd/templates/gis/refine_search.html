<script>
$(document).ready(function() {

  //add active class for selected in side bar
  $('li.attack_list').addClass('active');
  $('li.attack_list').children('a').attr('aria-expanded', 'true');
  $('#attackList').addClass('show');
  sidebar.addActiveClass("{% url 'gis:refine_search' %}");

  //セレクトボタンかセレクトボックスが選択されたとき
  $('input[type="checkbox"], select[class="selectpicker"]').on('change', function() {
    //上限下限Valueのチェック
    // checkSelectValue();
    //顧客絞込
    getSearchCustomer();
  });

  //検索条件保存ボタンが押されたとき
  $('button[name="saveSearch"]').on('click', function() {
    // saveSearchCustomer();
  });

});

//上限、下限選択が逆転している場合に選択している選択肢を正しく入れなおす処理を書く
function checkSelectValue() {
  var last_contact_date_start = $('select[name="last_contact_date_start"]').val(); //最終訪問下限
  var last_contact_date_end = $('select[name="last_contact_date_end"]').val(); //最終訪問上限
  var car_registration_date_start = $('select[name="car_registration_date_start"]').val(); //初回登録日下限
  var car_registration_date_end = $('select[name="car_registration_date_end"]').val(); //初回登録日上限

}

// 選択肢からAjaxにて顧客を絞込
function getSearchCustomer() {
  var rank_kinds = [];
  $('input[name="rank_kinds"]:checked').each(function(){rank_kinds.push(this.value);}); //顧客層
  var sale_kinds = [];
  $('input[name="sale_kinds"]:checked').each(function(){sale_kinds.push(this.value);}); //販売形態
  var inspection_limits = [];
  $('input[name="inspection_limits"]:checked').each(function(){inspection_limits.push(this.value);}); //車検
  var car_type = $('select[name="car_type"]').val(); //車種
  var shops = $('select[name="shops"]').val(); //店舗
  var last_contact_date = [];
  last_contact_date.push($('select[name="last_contact_date_start"]').val()); //最終訪問下限
  last_contact_date.push($('select[name="last_contact_date_end"]').val()); //最終訪問上限
  var car_registration_date = [];
  car_registration_date.push($('select[name="car_registration_date_start"]').val()); //初回登録日下限
  car_registration_date.push($('select[name="car_registration_date_end"]').val()); //初回登録日上限
  console.log(rank_kinds);
  console.log(car_type);

  $.ajax({
    type: "POST",
    url: "{% url 'gis:search_customer' %}",
    data: {
      mylist: "false",
      rank_kinds: rank_kinds,
      sale_kinds: sale_kinds,
      inspection_limits: inspection_limits,
      car_type: car_type,
      shops: shops,
      last_contact_date: last_contact_date,
      car_registration_date: car_registration_date,
    },
    dataType: "json"
  }).done(function(data) {
    console.log(data.len);
    console.log(data.customers);
    var message = "検索マッチ件数：" + data.len + " 件";
    demo.showNotification('bottom','right', message);
  });
}

//検索条件の保存
function saveSearchCustomer() {
  var rank_kinds = [];
  $('input[name="rank_kinds"]:checked').each(function(){rank_kinds.push(this.value);}); //顧客層
  var sale_kinds = [];
  $('input[name="sale_kinds"]:checked').each(function(){sale_kinds.push(this.value);}); //販売形態
  var inspection_limits = [];
  $('input[name="inspection_limits"]:checked').each(function(){inspection_limits.push(this.value);}); //車検
  var car_type = $('select[name="car_type"]').val(); //車種
  var shops = $('select[name="shops"]').val(); //店舗
  var last_contact_date = [];
  last_contact_date.push($('select[name="last_contact_date_start"]').val()); //最終訪問下限
  last_contact_date.push($('select[name="last_contact_date_end"]').val()); //最終訪問上限
  var car_registration_date = [];
  car_registration_date.push($('select[name="car_registration_date_start"]').val()); //初回登録日下限
  car_registration_date.push($('select[name="car_registration_date_end"]').val()); //初回登録日上限
  console.log(rank_kinds);
  console.log(car_type);

  $.ajax({
    type: "POST",
    url: "",
    data: {
      rank_kinds: rank_kinds,
      sale_kinds: sale_kinds,
      inspection_limits: inspection_limits,
      car_type: car_type,
      shops: shops,
      last_contact_date: last_contact_date,
      car_registration_date: car_registration_date,
    },
    dataType: "json"
  }).done(function() {
    var message = "検索条件を保存しました。";
    demo.showNotification('bottom','right', message);
  });
}

  
</script>
