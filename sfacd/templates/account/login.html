{% extends 'account_base.html' %}
{% load static i18n %}

{% block content %}

<div class="content" style="height: 100vh;">
  <div class="container">
    <div class="col-lg-4 col-md-6 ml-auto mr-auto">
      <form class="form" method="POST" action="{% url 'account_login' %}">
        {% csrf_token %}
        <div class="card card-login">
          <div class="card-header ">
            <div class="card-header ">
              <h3 class="header text-center">Login</h3>
            </div>
          </div>
          <div class="card-body ">
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="nc-icon nc-email-85"></i>
                </span>
              </div>
              <input type="email" class="form-control" name="login" placeholder="メールアドレス">
            </div>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="nc-icon nc-key-25"></i>
                </span>
              </div>
              <input type="password" placeholder="パスワード" name="password" class="form-control">
            </div>
            <br/>
            <!-- <div class="form-group">
              <div class="form-check">
                <label class="form-check-label">
                  <input class="form-check-input" type="checkbox" value="" checked="">
                  <span class="form-check-sign"></span>
                  Subscribe to newsletter
                </label>
              </div>
            </div> -->
          </div>
          <div class="card-footer ">
            <button type="submit" class="btn btn-warning btn-round btn-block mb-3">Sign In</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock content %}
